<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BetterBubble.am - 1:1 Clone</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2fbff; font-family: 'Ubuntu', sans-serif; }
        canvas { display: block; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #stats { position: absolute; bottom: 10px; left: 10px; color: #555; font-weight: bold; }
        #leaderboard {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.4);
            color: white; padding: 15px; border-radius: 5px; min-width: 160px;
        }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 10px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3); pointer-events: auto;
        }
        input { padding: 12px; margin: 10px; border: 1px solid #ddd; border-radius: 5px; width: 220px; font-size: 16px; outline: none; }
        button { padding: 12px 25px; background: #008cff; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="overlay">
            <h1>BetterBubble.am</h1>
            <input type="text" id="nickInput" placeholder="Nick" maxlength="15">
            <br>
            <button id="startBtn">Graj</button>
        </div>
        <div id="leaderboard">
            <h4 style="margin:0 0 10px 0">Ranking</h4>
            <div id="leaderList"></div>
        </div>
        <div id="stats">Masa: <span id="massVal">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {}, food = [], viruses = [], myId = null, isPlaying = false;
        let camX = 0, camY = 0, camZoom = 1;

        startBtn.onclick = () => {
            socket.emit('join', document.getElementById('nickInput').value || "Adrian");
            document.getElementById('overlay').style.display = 'none';
            isPlaying = true;
        };

        socket.on('init', id => myId = id);
        socket.on('update', data => {
            players = data.players;
            food = data.food;
            viruses = data.viruses;
        });

        window.onmousemove = e => {
            if (!isPlaying) return;
            socket.emit('move', Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2));
        };

        window.onkeydown = e => {
            if (e.code === 'Space') socket.emit('split');
            if (e.code === 'KeyW') socket.emit('eject');
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[myId];

            if (me && me.cells.length > 0) {
                let avgX = 0, avgY = 0, totalSize = 0;
                me.cells.forEach(c => { avgX += c.x; avgY += c.y; totalSize += c.size; });
                avgX /= me.cells.length; avgY /= me.cells.length;

                camX += (avgX - canvas.width/2 - camX) * 0.1;
                camY += (avgY - canvas.height/2 - camY) * 0.1;
                document.getElementById('massVal').innerText = Math.floor(totalSize);

                ctx.save();
                ctx.translate(-camX, -camY);

                // Siatka
                ctx.strokeStyle = "#eee"; ctx.lineWidth = 1;
                ctx.beginPath();
                for(let x=0; x<=3000; x+=50) { ctx.moveTo(x,0); ctx.lineTo(x,3000); }
                for(let y=0; y<=3000; y+=50) { ctx.moveTo(0,y); ctx.lineTo(3000,y); }
                ctx.stroke();

                // Jedzenie
                food.forEach(f => {
                    ctx.fillStyle = f.color; ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fill();
                });

                // Wirusy
                viruses.forEach(v => {
                    ctx.fillStyle = "#33ff33"; ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 5;
                    ctx.beginPath(); ctx.arc(v.x, v.y, v.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });

                // Gracze
                for (let id in players) {
                    const p = players[id];
                    p.cells.forEach(cell => {
                        ctx.fillStyle = p.color; ctx.beginPath();
                        ctx.arc(cell.x, cell.y, cell.size, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 3; ctx.stroke();
                        
                        ctx.fillStyle = "white"; ctx.textAlign = "center";
                        ctx.font = `bold ${cell.size/2.5}px Arial`;
                        ctx.fillText(p.name, cell.x, cell.y + cell.size/6);
                    });
                }
                ctx.restore();

                const top = Object.values(players).sort((a,b) => b.score - a.score).slice(0,10);
                document.getElementById('leaderList').innerHTML = top.map((p,i) => 
                    `<div class="leader-item"><span>${i+1}. ${p.name}</span></div>`).join('');
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
