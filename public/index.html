<!DOCTYPE html>
<html>
<head>
    <title>BetterBubble.am</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f2fbff; font-family: sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; text-align: center; pointer-events: auto; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; padding: 15px; border-radius: 5px; min-width: 150px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #008cff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="menu">
            <h1>BetterBubble.am</h1>
            <input type="text" id="nick" placeholder="Twoje imię" maxlength="15">
            <br>
            <button id="playBtn">GRAJ</button>
        </div>
        <div id="leaderboard">
            <strong>Ranking:</strong>
            <div id="list"></div>
        </div>
    </div>
    <canvas id="cvs"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {}, food = [], viruses = [], myId = null;
        let camX = 0, camY = 0;

        document.getElementById('playBtn').onclick = () => {
            const nick = document.getElementById('nick').value;
            socket.emit('join', nick || "Adrian");
            document.getElementById('menu').style.display = 'none';
        };

        socket.on('init', id => myId = id);
        socket.on('update', data => { players = data.players; food = data.food; viruses = data.viruses; });

        window.onmousemove = e => {
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            socket.emit('move', angle);
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Zabezpieczenie przed błędem z Twojego screena
            if (myId && players[myId] && players[myId].cells) {
                const me = players[myId];
                camX = me.cells[0].x - canvas.width/2;
                camY = me.cells[0].y - canvas.height/2;

                ctx.save();
                ctx.translate(-camX, -camY);

                // Jedzenie
                food.forEach(f => {
                    ctx.fillStyle = f.color; ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fill();
                });

                // Gracze
                for(let id in players) {
                    const p = players[id];
                    p.cells.forEach(c => {
                        ctx.fillStyle = p.color; ctx.beginPath();
                        ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "white"; ctx.textAlign = "center";
                        ctx.fillText(p.name, c.x, c.y);
                    });
                }
                ctx.restore();

                // Ranking
                const sorted = Object.values(players).sort((a,b) => b.score - a.score).slice(0, 5);
                document.getElementById('list').innerHTML = sorted.map(p => `<div>${p.name}: ${p.score}</div>`).join('');
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
