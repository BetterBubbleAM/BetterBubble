<!DOCTYPE html>
<html>
<head>
    <title>BetterBubble.am</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let food = [];
        let myId = null;
        let smoothPositions = {};
        let camSmoothX = 0;
        let camSmoothY = 0;

        socket.on('connect', () => { myId = socket.id; });

        socket.on('gameUpdate', (data) => {
            players = data.players;
            food = data.food;
        });

        window.addEventListener('mousemove', (e) => {
            // Przesyłamy pozycję myszki względem świata gry
            socket.emit('movement', { 
                x: e.clientX + camSmoothX, 
                y: e.clientY + camSmoothY 
            });
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[myId];

            if (me) {
                // Inicjalizacja wygładzania
                if (!smoothPositions[myId]) {
                    smoothPositions[myId] = { x: me.x, y: me.y };
                    camSmoothX = me.x - canvas.width / 2;
                    camSmoothY = me.y - canvas.height / 2;
                }

                // Płynna kamera
                const targetCamX = smoothPositions[myId].x - canvas.width / 2;
                const targetCamY = smoothPositions[myId].y - canvas.height / 2;
                camSmoothX += (targetCamX - camSmoothX) * 0.1;
                camSmoothY += (targetCamY - camSmoothY) * 0.1;

                ctx.save();
                ctx.translate(-camSmoothX, -camSmoothY);

                // Rysowanie jedzenia
                food.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Rysowanie graczy
                for (let id in players) {
                    let p = players[id];
                    if (!smoothPositions[id]) smoothPositions[id] = { x: p.x, y: p.y };

                    // Interpolacja pozycji
                    smoothPositions[id].x += (p.x - smoothPositions[id].x) * 0.12;
                    smoothPositions[id].y += (p.y - smoothPositions[id].y) * 0.12;

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(smoothPositions[id].x, smoothPositions[id].y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Nazwa gracza
                    ctx.fillStyle = "white";
                    ctx.textAlign = "center";
                    ctx.font = "bold 14px Arial";
                    ctx.fillText(id === myId ? "TY" : "GRACZ", smoothPositions[id].x, smoothPositions[id].y - p.size - 5);
                }
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
