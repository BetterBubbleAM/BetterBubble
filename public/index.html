<!DOCTYPE html>
<html>
<head>
    <title>BetterBubble.am</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let myId = null;
        socket.on('connect', () => { myId = socket.id; });

        window.addEventListener('mousemove', (e) => {
            socket.emit('movement', { x: e.clientX, y: e.clientY });
        });

        socket.on('state', (data) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const me = data.players[myId];
            
            // Jeśli serwer Cię widzi, centrujemy świat na Tobie
            if (me) {
                const offsetX = canvas.width / 2 - me.x;
                const offsetY = canvas.height / 2 - me.y;

                ctx.save();
                ctx.translate(offsetX, offsetY);

                // Rysuj jedzenie
                data.food.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Rysuj graczy
                for (let id in data.players) {
                    const p = data.players[id];
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = 'white';
                    ctx.textAlign = 'center';
                    ctx.fillText(id === myId ? "TY" : "Gracz", p.x, p.y - p.size - 5);
                }
                ctx.restore();
            }
        });
    </script>
</body>
</html>
