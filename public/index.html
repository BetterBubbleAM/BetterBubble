<!DOCTYPE html>
<html>
<head>
    <title>BetterBubble.am - Original Style</title>
    <style>
        body { margin: 0; background: #f2fbff; overflow: hidden; font-family: 'Ubuntu', sans-serif; }
        #canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        }
        #menu {
            background: white; padding: 40px; border-radius: 8px; width: 350px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input { width: 90%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 18px; }
        button { width: 100%; padding: 12px; background: #008cff; color: white; border: none; border-radius: 4px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="menu">
            <h1 style="color:#555; margin:0;">Agar.io</h1>
            <input type="text" id="nick" placeholder="Nick" maxlength="15">
            <button id="play">Graj</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let players = {}, food = [], viruses = [], myId = null;
        let camX = 0, camY = 0;

        document.getElementById('play').onclick = () => {
            socket.emit('join', document.getElementById('nick').value);
            document.getElementById('overlay').style.display = 'none';
        };

        socket.on('init', id => myId = id);
        socket.on('update', d => { players = d.players; food = d.food; viruses = d.viruses; });

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Zabezpieczenie przed białym ekranem
            if(myId && players[myId] && players[myId].cells.length > 0) {
                const me = players[myId].cells[0];
                camX += (me.x - canvas.width/2 - camX) * 0.1;
                camY += (me.y - canvas.height/2 - camY) * 0.1;

                ctx.save();
                ctx.translate(-camX, -camY);

                // Siatka
                ctx.strokeStyle = "rgba(0,0,0,0.05)";
                for(let x=0; x<5000; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,5000); ctx.stroke(); }
                for(let y=0; y<5000; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(5000,y); ctx.stroke(); }

                food.forEach(f => {
                    ctx.fillStyle = f.color; ctx.beginPath();
                    ctx.arc(f.x, f.y, 10, 0, Math.PI*2); ctx.fill();
                });

                viruses.forEach(v => {
                    ctx.fillStyle = "#33ff33"; ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 6;
                    ctx.beginPath(); ctx.arc(v.x, v.y, 60, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });

                for(let id in players) {
                    players[id].cells.forEach(c => {
                        const r = Math.sqrt(c.mass * 100);
                        ctx.fillStyle = players[id].color; ctx.beginPath();
                        ctx.arc(c.x, c.y, r, 0, Math.PI*2); ctx.fill();
                        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = r*0.05; ctx.stroke();
                        ctx.fillStyle = "white"; ctx.textAlign = "center";
                        ctx.font = `bold ${r/2.5}px Ubuntu`;
                        ctx.fillText(players[id].name, c.x, c.y + r/10);
                    });
                }
                ctx.restore();
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
