<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BetterBubble.am - Granice i Masa</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2fbff; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 100;
        }
        input { padding: 12px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; width: 220px; font-size: 16px; }
        button { padding: 12px 25px; background: #008cff; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
        #leaderboard {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6);
            color: white; padding: 15px; border-radius: 8px; min-width: 160px; pointer-events: none;
        }
        .leader-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>BetterBubble.am</h1>
        <input type="text" id="nickInput" placeholder="Twój Nick" maxlength="15">
        <br>
        <button id="startBtn">GRAJ TERAZ</button>
    </div>

    <div id="leaderboard">
        <h3>Ranking</h3>
        <div id="leaderList"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let food = [];
        let mapSize = 3000; // Wielkość mapy z serwera
        let myId = null;
        let isPlaying = false;
        let camX = 0, camY = 0;
        let lerpPositions = {};

        startBtn.addEventListener('click', () => {
            const nick = document.getElementById('nickInput').value || "Gość";
            socket.emit('join', nick);
            overlay.style.display = 'none';
            isPlaying = true;
        });

        socket.on('init', (data) => { 
            myId = data.id; 
            mapSize = data.mapSize; 
        });

        socket.on('update', (data) => {
            players = data.players;
            food = data.food;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;
            const angle = Math.atan2(e.clientY - canvas.height / 2, e.clientX - canvas.width / 2);
            socket.emit('move', angle);
        });

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.code === 'Space') socket.emit('split');
            if (e.code === 'KeyW') socket.emit('eject');
        });

        function drawGrid() {
            const size = 50;
            ctx.strokeStyle = "#e0e0e0";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = (canvas.width / 2 - lerpPositions[myId].x) % size; x < canvas.width; x += size) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = (canvas.height / 2 - lerpPositions[myId].y) % size; y < canvas.height; y += size) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[myId];

            if (me) {
                if (!lerpPositions[myId]) lerpPositions[myId] = { x: me.x, y: me.y };
                lerpPositions[myId].x += (me.x - lerpPositions[myId].x) * 0.2;
                lerpPositions[myId].y += (me.y - lerpPositions[myId].y) * 0.2;

                camX = lerpPositions[myId].x - canvas.width / 2;
                camY = lerpPositions[myId].y - canvas.height / 2;

                drawGrid();
                ctx.save();
                ctx.translate(-camX, -camY);

                // GRANICE MAPY
                ctx.strokeStyle = "#ff4444";
                ctx.lineWidth = 10;
                ctx.strokeRect(0, 0, mapSize, mapSize);

                // JEDZENIE I WYRZUCONA MASA
                food.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size || 8, 0, Math.PI * 2);
                    ctx.fill();
                });

                // GRACZE
                for (let id in players) {
                    const p = players[id];
                    if (!lerpPositions[id]) lerpPositions[id] = { x: p.x, y: p.y };
                    lerpPositions[id].x += (p.x - lerpPositions[id].x) * 0.2;
                    lerpPositions[id].y += (p.y - lerpPositions[id].y) * 0.2;

                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(lerpPositions[id].x, lerpPositions[id].y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = "rgba(0,0,0,0.1)";
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.fillStyle = "white";
                    ctx.font = `bold ${Math.max(12, p.size/2.5)}px Arial`;
                    ctx.textAlign = "center";
                    ctx.fillText(p.name, lerpPositions[id].x, lerpPositions[id].y + 5);
                }
                ctx.restore();

                const sorted = Object.values(players).sort((a, b) => b.size - a.size).slice(0, 10);
                document.getElementById('leaderList').innerHTML = sorted.map((p, i) => 
                    `<div class="leader-item"><span>${i+1}. ${p.name}</span><span>${Math.floor(p.size)}</span></div>`
                ).join('');
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
