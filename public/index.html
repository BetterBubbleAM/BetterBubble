<!DOCTYPE html>
<html>
<head>
    <title>BetterBubble.am</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="ctx"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('ctx');
        const ctx = canvas.getContext('2d');
        const socket = io();

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let food = [];
        let myId = null;

        socket.on('connect', () => { myId = socket.id; });
        socket.on('state', (data) => {
            players = data.players;
            food = data.food;
        });

        window.addEventListener('mousemove', (e) => {
            const camX = players[myId] ? players[myId].x - canvas.width / 2 : 0;
            const camY = players[myId] ? players[myId].y - canvas.height / 2 : 0;
            socket.emit('movement', { x: e.clientX + camX, y: e.clientY + camY });
        });
let smoothPositions = {};
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[myId];

            if (me) {
    // Kamera podąża za wygładzoną pozycją "me", a nie surową
    const camX = smoothPositions[myId].x - canvas.width / 2;
    const camY = smoothPositions[myId].y - canvas.height / 2;

                ctx.save();
                ctx.translate(-camX, -camY);

                food.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                });

                for(let id in players) {
                    for(let id in players) {
    let p = players[id];

    // Jeśli gracz pojawił się pierwszy raz, zapisz jego startową pozycję
    if (!smoothPositions[id]) {
        smoothPositions[id] = { x: p.x, y: p.y };
    }

    ctx.fillText(id === myId ? "TY" : "GRACZ", smoothPositions[id].x, smoothPositions[id].y - p.size - 5);
    smoothPositions[id].x += (p.x - smoothPositions[id].x) * 0.15;
    smoothPositions[id].y += (p.y - smoothPositions[id].y) * 0.15;

    ctx.fillStyle = p.color;
    ctx.beginPath();
    // Używamy wygładzonej pozycji (smoothPositions) zamiast surowej z serwera (p)
    ctx.arc(smoothPositions[id].x, smoothPositions[id].y, p.size, 0, Math.PI * 2);
    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.textAlign = "center";
                    ctx.fillText(id === myId ? "TY" : "GRACZ", p.x, p.y - p.size - 5);
                }
                ctx.restore();
            }
            requestAnimationFrame(draw); // To zapewnia 60 FPS rysowania
        }
        draw();
    </script>
</body>
</html>
