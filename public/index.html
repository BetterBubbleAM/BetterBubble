<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BetterBubble.am - Agar Base</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2fbff; font-family: 'Ubuntu', sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9); padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 100;
        }
        #leaderboard {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6);
            color: white; padding: 15px; border-radius: 8px; min-width: 180px; pointer-events: none;
        }
        input { padding: 12px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; width: 200px; }
        button { padding: 12px 25px; background: #008cff; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>BetterBubble.am</h1>
        <input type="text" id="nickInput" placeholder="Nick" maxlength="15">
        <br>
        <button id="startBtn">START</button>
    </div>
    <div id="leaderboard"><h3>Ranking</h3><div id="leaderList"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {}, food = [], viruses = [], myId = null, isPlaying = false;
        let camX = 0, camY = 0, mapSize = 3000;

        startBtn.addEventListener('click', () => {
            socket.emit('join', document.getElementById('nickInput').value || "Adrian");
            document.getElementById('overlay').style.display = 'none';
            isPlaying = true;
        });

        socket.on('init', (data) => { myId = data.id; mapSize = data.mapSize; });
        socket.on('update', (data) => { 
            players = data.players; 
            food = data.food; 
            viruses = data.viruses;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;
            const angle = Math.atan2(e.clientY - canvas.height / 2, e.clientX - canvas.width / 2);
            socket.emit('move', angle);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') socket.emit('split');
            if (e.code === 'KeyW') socket.emit('eject');
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // System anty-crash
            if (myId && players[myId] && players[myId].cells && players[myId].cells.length > 0) {
                const me = players[myId];
                let avgX = 0, avgY = 0;
                me.cells.forEach(c => { avgX += c.x; avgY += c.y; });
                avgX /= me.cells.length;
                avgY /= me.cells.length;

                camX += (avgX - canvas.width / 2 - camX) * 0.1;
                camY += (avgY - canvas.height / 2 - camY) * 0.1;

                ctx.save();
                ctx.translate(-camX, -camY);

                // Siatka
                ctx.strokeStyle = "rgba(0,0,0,0.05)";
                ctx.beginPath();
                for(let x=0; x<=mapSize; x+=60) { ctx.moveTo(x,0); ctx.lineTo(x,mapSize); }
                for(let y=0; y<=mapSize; y+=60) { ctx.moveTo(0,y); ctx.lineTo(mapSize,y); }
                ctx.stroke();

                // Jedzenie i Wirusy
                food.forEach(f => {
                    ctx.fillStyle = f.color; ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                });

                viruses.forEach(v => {
                    ctx.fillStyle = "#33ff33"; ctx.beginPath();
                    ctx.arc(v.x, v.y, v.size, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "#2ecc71"; ctx.lineWidth = 4; ctx.stroke();
                });

                // Gracze
                for (let id in players) {
                    const p = players[id];
                    if(!p.cells) continue;
                    p.cells.forEach(cell => {
                        ctx.fillStyle = p.color; ctx.beginPath();
                        ctx.arc(cell.x, cell.y, cell.size, 0, Math.PI * 2); ctx.fill();
                        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                        ctx.fillText(p.name, cell.x, cell.y);
                    });
                }
                ctx.restore();

                const sorted = Object.values(players).sort((a,b) => b.score - a.score).slice(0,10);
                document.getElementById('leaderList').innerHTML = sorted.map((p,i) => 
                    `<div class="leader-item"><span>${i+1}. ${p.name}</span><span>${Math.floor(p.score)}</span></div>`
                ).join('');
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
