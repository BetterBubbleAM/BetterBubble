<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BetterBubble</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f2fbff; font-family: Arial, sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px;
            text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.3); z-index: 10;
        }
        input { padding: 12px; margin: 10px; border: 2px solid #ddd; border-radius: 8px; width: 200px; font-size: 16px; }
        button { padding: 12px 30px; background: #008cff; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; }
        button:hover { background: #0076d6; }
        
        #leaderboard {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 0, 0, 0.6); color: white;
            padding: 15px; border-radius: 10px; min-width: 180px;
            pointer-events: none; border: 1px solid rgba(255,255,255,0.2);
        }
        #leaderboard h3 { margin: 0 0 10px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }
        .leader-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
        .leader-item.me { color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>BetterBubble.am</h1>
        <input type="text" id="nickInput" placeholder="Podaj Nick..." maxlength="15">
        <br>
        <button onclick="startGame()">GRAJ TERAZ</button>
    </div>

    <div id="leaderboard">
        <h3>Ranking</h3>
        <div id="leaderList"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {};
        let food = [];
        let myId = null;
        let isPlaying = false;
        let camX = 0, camY = 0;
        let lerpPositions = {};

        function startGame() {
            const nick = document.getElementById('nickInput').value || "Bezimienny";
            socket.emit('join', nick);
            overlay.style.display = 'none';
            isPlaying = true;
        }

        socket.on('init', (id) => { myId = id; });
        socket.on('update', (data) => {
            players = data.players;
            food = data.food;
        });
        socket.on('died', () => {
            isPlaying = false;
            overlay.style.display = 'block';
            alert("Zostałeś zjedzony!");
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPlaying) return;
            const angle = Math.atan2(e.clientY - canvas.height / 2, e.clientX - canvas.width / 2);
            socket.emit('move', angle);
        });

        function drawGrid() {
            const size = 60;
            ctx.strokeStyle = "#e8e8e8";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = -camX % size; x < canvas.width; x += size) {
                ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
            }
            for (let y = -camY % size; y < canvas.height; y += size) {
                ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const me = players[myId];

            if (me) {
                if (!lerpPositions[myId]) lerpPositions[myId] = { x: me.x, y: me.y };
                lerpPositions[myId].x += (me.x - lerpPositions[myId].x) * 0.15;
                lerpPositions[myId].y += (me.y - lerpPositions[myId].y) * 0.15;

                camX = lerpPositions[myId].x - canvas.width / 2;
                camY = lerpPositions[myId].y - canvas.height / 2;

                drawGrid();
                ctx.save();
                ctx.translate(-camX, -camY);

                food.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                });
